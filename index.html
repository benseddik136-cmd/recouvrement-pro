function dc(c){return Object.assign({},c,{rec:0,prev:0,st:"En attente",note:""});}
function load(){

var TOTAL_CREANCES=82762008.23;
var OBJECTIF=TOTAL_CREANCES*0.6; // 49,657,204.94

var fmt=function(n){return new Intl.NumberFormat("fr-MA",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);};
var fs=function(n){var a=Math.abs(n||0);if(a>=1e6)return (n/1e6).toFixed(1)+"M";if(a>=1e3)return (n/1e3).toFixed(0)+"K";return String(Math.round(n||0));};

function prio(t,rec){
  rec=rec||0;
  var pct=t>0?(rec/t)*100:0;
  // If recovered >= 100%
  if(pct>=100) return{lbl:"Recouvré",bc:"b-grn",dot:"🟢",pc:"p4"};
  // If recovered >= 50%
  if(pct>=50) return{lbl:"Bon",bc:"b-yel",dot:"🟡",pc:"p3"};
  // If recovered > 0%
  if(pct>0) return{lbl:"En cours",bc:"b-ora",dot:"🟠",pc:"p2"};
  // Not recovered yet - use amount
  if(t>=5e6)return{lbl:"Critique",bc:"b-red",dot:"🔴",pc:"p1"};
  if(t>=2e6)return{lbl:"Haute",bc:"b-ora",dot:"🟠",pc:"p2"};
  if(t>=5e5)return{lbl:"Moyenne",bc:"b-yel",dot:"🟡",pc:"p3"};
  return{lbl:"Standard",bc:"b-grn",dot:"🟢",pc:"p4"};
}

function met(){
  var cl=S.cl.filter(function(x){return x.total>0;});
  var tr=cl.reduce(function(s,x){return s+x.rec+(x.st==="Promesse"?x.prev:0);},0);
  var tp=cl.reduce(function(s,x){return s+x.prev;},0);
  // Progress vs objectif (objectif = 100%)
  var trRec=cl.reduce(function(s,x){return s+x.rec;},0);
  var trProm=cl.reduce(function(s,x){return s+(x.prev||0);},0);
  var tr=trRec+trProm;
  var pp=Math.min((trRec/OBJECTIF)*100,100);
  var pp2=Math.min(((trRec+trProm)/OBJECTIF)*100,100);
  return{
    tc:TOTAL_CREANCES,tr:tr,trRec:trRec,trProm:trProm,tp:tp,ob:OBJECTIF,pp:pp,pp2:pp2,

function showList(type){
  var title, list;
  if(type==='rec'){
    title='✅ Clients Recouverts';
    list=S.cl.filter(function(c){return c.st==="Recouvré"&&c.rec>0;}).sort(function(a,b){return b.rec-a.rec;});
  } else {
    title='🤝 Clients Promesse';
    list=S.cl.filter(function(c){return (c.prev||0)>0;}).sort(function(a,b){return (b.prev||0)-(a.prev||0);});
  }
  var total=list.reduce(function(s,c){return s+(type==='rec'?c.rec:c.prev||c.total);},0);
  var html='<div class="modal-bg" onclick="closeModal(event,this)">'+
    '<div class="modal">'+
    '<div class="modal-title">'+title+'</div>'+
    '<div style="background:var(--surf2);border-radius:var(--r2);padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between">'+
    '<span style="font-size:12px;color:var(--text2)">'+(type==='rec'?'Total recouvré':'Total promis')+'</span>'+
    '<span style="font-size:14px;font-weight:800;color:'+(type==='rec'?'var(--green)':'var(--amber)')+'">'+fmt(total)+' MAD</span></div>'+
    (list.length===0?'<div style="text-align:center;color:var(--text3);padding:20px">Aucun client</div>':'')+
    list.map(function(c){
      var amt=type==='rec'?c.rec:(c.prev||0);
      return '<div class="dl-item" onclick="closeModalDirect();od('+c.id+')">'+
        '<span class="dl-nom">'+c.nom+'</span>'+
        '<span class="dl-amt '+(type==='rec'?'':'amber')+'">'+fmt(amt)+' MAD</span></div>';
    }).join("")+
    '<button class="modal-cancel" onclick="closeModalDirect()">Fermer</button>'+
    '</div></div>';
  document.getElementById("modal").innerHTML=html;
  document.getElementById("modal").style.display="flex";
}

function closeModal(e,bg){if(e.target===bg)closeModalDirect();}
function closeModalDirect(){document.getElementById("modal").style.display="none";document.getElementById("modal").innerHTML="";}

function rClients(){
  var sorted=S.cl.slice().sort(function(a,b){return b.total-a.total;});
  var fil=sorted.filter(function(c){
    var q=S.q.toLowerCase();
    if(q&&!c.nom.toLowerCase().includes(q))return false;
    if(S.fst!=="Tous"&&c.st!==S.fst)return false;
    if(S.fp!=="Tous"&&prio(c.total,c.rec).lbl!==S.fp)return false;
    return true;
  });

  var r='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
    '<div class="st" style="margin-bottom:0">Liste clients</div>'+
    '<button onclick="showAddClient()" style="background:var(--blue);color:#fff;border:none;border-radius:var(--r2);padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">+ Ajouter</button></div>'+
    '<div class="srch-wrap"><input class="srch" id="si" placeholder="🔍 Rechercher..." value="'+S.q+'" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/></div>'+
    '<div class="chips">'+["Tous",...STLIST].map(function(s){return '<button class="chip'+(S.fst===s?' on':'')+'" data-st="'+s+'" onclick="fltSt(this)">'+s+'</button>';}).join("")+'</div>'+
    '<div class="chips">'+["Tous","Critique","Haute","Moyenne","Standard"].map(function(p){return '<button class="chip'+(S.fp===p?' onp':'')+'" data-pr="'+p+'" onclick="fltPr(this)">'+p+'</button>';}).join("")+'</div>'+
    '<div style="font-size:12px;color:var(--text3);margin-bottom:9px">'+fil.length+' client(s)</div>';

  if(!fil.length)r+='<div class="empty"><div class="ei">🔍</div><p>Aucun résultat</p></div>';
  fil.forEach(function(c){
    var p=prio(c.total,c.rec);var rest=c.total-c.rec;var pct=c.total>0?((c.rec/c.total)*100).toFixed(0):0;
    var sc=SCL[c.st]||"b-gry";
    r+='<div class="cc '+p.pc+'" onclick="od('+c.id+')">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'+
      '<div style="flex:1;min-width:0"><div class="cn">'+c.nom+'</div>'+
      '<div class="cm">Dû: <b>'+fs(rest)+'</b> / '+fs(c.total)+' MAD</div>'+
      (c.prev>0?'<div class="cpv">Promesse: '+fs(c.prev)+' MAD</div>':'')+
      '</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+
      '<span class="bdg '+sc+'">'+c.st+'</span><span class="bdg '+p.bc+'">'+p.dot+' '+p.lbl+'</span></div></div>'+
      '<div class="mb" style="height:5px;margin-top:7px"><div class="mf" style="width:'+pct+'%"></div></div>'+
      '<div style="font-size:11px;color:var(--text3);margin-top:2px">'+pct+'% recouvré</div></div>';
  });
  return r;
}

}

// Actions
function go(t){S.tab=t;S.did=null;render();}
function od(id){S.did=id;S.tab="clients";render();}
function uc(id,p){S.cl=S.cl.map(function(c){return c.id===id?Object.assign({},c,p):c;});save();render();}
function sn(id){
  var r=parseFloat(document.getElementById("ir").value)||0;
  var p=parseFloat(document.getElementById("ip").value)||0;
  var patch={rec:r,prev:p};
  var c=S.cl.find(function(x){return x.id===id;});
  // Auto statut - independent
  if(r>0 && p>0) patch.st="Recouvré"; // both: recouvré takes priority
  else if(r>0) patch.st="Recouvré";
  else if(p>0) patch.st="Promesse";
  else patch.st="En attente";
  S.cl=S.cl.map(function(x){return x.id===id?Object.assign({},x,patch):x;});
  save();
  // Go to dashboard
  S.did=null;
  S.tab="dash";
  render();
}

function chgSt(btn){var cid=parseInt(btn.getAttribute("data-cid"));var st=btn.getAttribute("data-s");uc(cid,{st:st});}
function fltSt(btn){S.fst=btn.getAttribute("data-st");render();}
function fltPr(btn){S.fp=btn.getAttribute("data-pr");render();}

// Add client modal
function showAddClient(){
  var html='<div class="modal-bg" onclick="closeModal(event,this)">'+
    '<div class="modal">'+
    '<div class="modal-title">➕ Ajouter un client</div>'+
    '<div class="ilbl">Nom du client</div>'+
    '<input class="inp" id="nc" placeholder="Ex: NOUVEAU CLIENT SARL" autocomplete="off" style="margin-bottom:12px"/>'+
    '<div class="ilbl">Montant total (MAD)</div>'+
    '<input class="inp" id="nm" type="number" placeholder="0" autocomplete="off"/>'+
    '<button class="modal-btn" onclick="addClient()">Ajouter</button>'+
    '<button class="modal-cancel" onclick="closeModalDirect()">Annuler</button>'+
    '</div></div>';
  document.getElementById("modal").innerHTML=html;
  document.getElementById("modal").style.display="flex";
  setTimeout(function(){var el=document.getElementById("nc");if(el)el.focus();},100);
}

function addClient(){
  var nom=(document.getElementById("nc").value||"").trim().toUpperCase();
  var total=parseFloat(document.getElementById("nm").value)||0;
  if(!nom){alert("Veuillez saisir un nom");return;}
  var newId=Date.now();
  var nc=dc({id:newId,nom:nom,total:total});
  S.cl.push(nc);
  save();
  closeModalDirect();
  S.did=newId;
  S.tab="clients";
  render();
}

function bind(){
  // Search - keep focus
  var si=document.getElementById("si");
  if(si){
    si.addEventListener("input",function(){S.q=this.value;renderKeepFocus();});
    si.addEventListener("keydown",function(e){e.stopPropagation();});
  }
  var fi=document.getElementById("fi");
  if(fi)fi.addEventListener("change",function(e){
    var f=e.target.files[0];if(!f)return;
    var rd=new FileReader();
    rd.onload=function(ev){
      var lines=ev.target.result.split("\n").filter(Boolean);
      var added=0,updated=0;
      var cl=S.cl.slice();
      lines.forEach(function(line){
        var pts=line.split(/[;,\t]/);
        if(pts.length>=2){
          var nom=pts[0].trim();
          var total=parseFloat(pts[1].replace(/\s/g,"").replace(",","."));
          if(nom&&!isNaN(total)){
            var idx=cl.findIndex(function(c){return c.nom.toLowerCase()===nom.toLowerCase();});
            if(idx===-1){cl.push(dc({id:Date.now()+added,nom:nom,total:total}));added++;}
            else{cl[idx].total=total;updated++;}
          }
        }
      });
      S.cl=cl;save();
      var msg=document.getElementById("im");
      if(msg)msg.textContent="✅ "+added+" ajouté(s), "+updated+" mis à jour";
      render();
    };
    rd.readAsText(f);
  });
}

function renderKeepFocus(){
  var b=document.getElementById("body");
  var top=b.scrollTop;
  var v={dash:rDash,clients:rClients,import:rImport};
  b.innerHTML=(v[S.tab]||rDash)();
  b.scrollTop=top;
  bindKeepFocus();
  var si=document.getElementById("si");
  if(si){si.focus();si.setSelectionRange(si.value.length,si.value.length);}
}

function bindKeepFocus(){
  var si=document.getElementById("si");
  if(si){
    si.addEventListener("input",function(){S.q=this.value;renderKeepFocus();});
    si.addEventListener("keydown",function(e){e.stopPropagation();});
  }
}
